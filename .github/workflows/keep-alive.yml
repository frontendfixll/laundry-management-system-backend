name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://laundry-management-system-backend-1.onrender.com/api/health
